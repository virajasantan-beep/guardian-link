{% extends "base.html" %}
{% block title %}Login | Child Safety Monitoring{% endblock %}

{% block content %}
<div class="row align-items-center justify-content-center min-vh-75">
  <div class="col-lg-5 col-md-8">
    <div class="card glass-card p-4 p-md-5 login-card">
      <div class="text-center mb-4">
        <div class="login-icon mb-3"><i class="bi bi-person-lock fs-1"></i></div>
        <h2 class="fw-bold">Welcome Back</h2>
        <p class="text-secondary-light">Login to continue to your dashboard</p>
      </div>

      <form method="POST" action="{{ url_for('routes_bp.login') }}">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <div class="input-group input-group-glow">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" name="email" class="form-control form-control-dark"
                   placeholder="Enter your email" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group input-group-glow">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control form-control-dark"
                   placeholder="Enter your password" required>
          </div>
        </div>

        <button type="submit" class="btn btn-gradient w-100 py-2 mt-2">
          <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </button>
      </form>

      <div class="text-center mt-4">
        <p class="mb-1 text-secondary-light">Don't have an account?</p>
        <a href="{{ url_for('routes_bp.register') }}"
           class="link-glow fw-semibold text-decoration-none">Register here</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
