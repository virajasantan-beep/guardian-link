{% extends "base.html" %}
{% block title %}Delete My Account | Child Safety Monitoring{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6 col-md-9">
    <div class="card glass-card p-4 p-md-5 delete-card">
      <div class="text-center mb-4">
        <div class="login-icon mb-3">
          <i class="bi bi-person-x-fill fs-1 text-danger"></i>
        </div>
        <h2 class="fw-bold text-danger">Delete My Account</h2>
        <p class="text-secondary-light">
          This will permanently erase your account and all your data.
        </p>
      </div>

      <div class="alert alert-danger glass-alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        This action <strong>cannot be undone.</strong>
      </div>

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" name="password" class="form-control form-control-dark"
                 placeholder="Enter your password to confirm" required>
        </div>
        <button type="submit" class="btn btn-danger w-100 py-2">
          <i class="bi bi-trash3 me-2"></i>Yes, Delete My Account
        </button>
      </form>

      <div class="text-center mt-3">
        <a href="{{ url_for('routes_bp.child_dashboard' if session.get('role') == 'child' else 'routes_bp.parent_dashboard') }}"
           class="link-glow text-decoration-none">Cancel and go back</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
