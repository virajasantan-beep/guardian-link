<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guardian Link</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style_additions.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <!-- Social accounts styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/social_accounts.css') }}">
  <!-- NEW: live monitor styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/monitor.css') }}">
</head>
<body>
{% block content %}{% endblock %}
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script src="{{ url_for('static', filename='js/main_additions.js') }}"></script>
<!-- Social accounts logic -->
<script src="{{ url_for('static', filename='js/social_accounts.js') }}"></script>
<!-- NEW: Socket.IO client (pin to match flask-socketio 5.x server) -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"
        integrity="sha384-2huaZvOR9iDzHqslqwpR87isEmrfxqyWOF7hr7BY6KG0+hVKLoEXMPUJw3ynWuhO"
        crossorigin="anonymous"></script>
<!-- NEW: Tesseract.js for on-screen OCR text extraction -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<!-- NEW: live monitor logic -->
<script src="{{ url_for('static', filename='js/monitor.js') }}"></script>
</body>
</html>
