{% extends "base.html" %}
{% block content %}
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">GL</div>
<button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀️ Light</button>
    <nav class="sidebar-nav">
      <a class="nav-item active" onclick="showSection('alerts')">
        <span class="nav-icon">🚨</span> Alerts
        <span class="nav-badge" id="alert-badge"></span>
      </a>
      <a class="nav-item" onclick="showSection('grooming')">
        <span class="nav-icon">🧠</span> Grooming
      </a>
      <a class="nav-item" onclick="showSection('reports')">
        <span class="nav-icon">📊</span> Reports
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- TOP STATS -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-label">Total Messages</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card danger">
        <div class="stat-label">Risky Messages</div>
        <div class="stat-value" id="stat-risky">—</div>
      </div>
      <div class="stat-card warning">
        <div class="stat-label">Risk Percentage</div>
        <div class="stat-value" id="stat-percent">—</div>
      </div>
      <div class="stat-card danger">
        <div class="stat-label">High Risk Users</div>
        <div class="stat-value" id="stat-highrisk">—</div>
      </div>
    </div>

    <!-- ALERTS SECTION -->
    <section id="section-alerts" class="section active">
      <div class="section-header">
        <h2>Active Alerts</h2>
        <span class="section-badge" id="alerts-count"></span>
      </div>
      <div id="alerts-list"></div>
    </section>

    <!-- GROOMING SECTION -->
    <section id="section-grooming" class="section">
      <div class="section-header"><h2>Grooming Detection</h2></div>
      <div id="grooming-list" class="grid"></div>
    </section>

    <!-- REPORTS SECTION -->
    <section id="section-reports" class="section">
      <div class="section-header"><h2>Risk Reports</h2></div>
      <div class="reports-grid">
        <div class="panel">
          <h3>Safe vs Risky</h3>
          <canvas id="donut-chart"></canvas>
        </div>
        <div class="panel">
          <h3>User Risk Table</h3>
          <div id="user-table"></div>
        </div>
      </div>
    </section>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>startAutoRefresh();</script>
{% endblock %}
